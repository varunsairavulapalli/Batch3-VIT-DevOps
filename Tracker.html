<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tracker Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
text-align:center;
}

.section{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

input,button{
padding:10px;
margin:5px;
}

button{
background:#007bff;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.list-item{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:5px;
display:flex;
justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">

<h1>Universal Tracker Dashboard</h1>

<div class="card-container">
<div class="card">
<h3>Projects</h3>
<h2 id="projectCount">0</h2>
</div>

<div class="card">
<h3>Employees</h3>
<h2 id="employeeCount">0</h2>
</div>

<div class="card">
<h3>Expenses</h3>
<h2 id="expenseCount">0</h2>
</div>

<div class="card">
<h3>Students</h3>
<h2 id="studentCount">0</h2>
</div>
</div>

<!-- PROJECT TRACKER -->

<div class="section">
<h2>Project Tracker</h2>

<input type="text" id="projectName"
placeholder="Project Name">

<button onclick="addProject()">
Add Project
</button>

<div id="projectList"></div>
</div>

<!-- EMPLOYEE TRACKER -->

<div class="section">
<h2>Employee Tracker</h2>

<input type="text" id="employeeName"
placeholder="Employee Name">

<button onclick="addEmployee()">
Add Employee
</button>

<div id="employeeList"></div>
</div>

<!-- EXPENSE TRACKER -->

<div class="section">
<h2>Expense Tracker</h2>

<input type="text" id="expenseName"
placeholder="Expense">

<input type="number" id="expenseAmount"
placeholder="Amount">

<button onclick="addExpense()">
Add Expense
</button>

<div id="expenseList"></div>
</div>

<!-- STUDENT TRACKER -->

<div class="section">
<h2>Student Tracker</h2>

<input type="text" id="studentName"
placeholder="Student Name">

<button onclick="addStudent()">
Add Student
</button>

<div id="studentList"></div>
</div>

</div>

<script>

let projects=[];
let employees=[];
let expenses=[];
let students=[];

function updateDashboard(){

document.getElementById("projectCount")
.innerText=projects.length;

document.getElementById("employeeCount")
.innerText=employees.length;

document.getElementById("expenseCount")
.innerText=expenses.length;

document.getElementById("studentCount")
.innerText=students.length;
}

/* PROJECT */

function addProject(){

let name=document.getElementById
("projectName").value;

if(name==="") return;

projects.push(name);

displayProjects();

updateDashboard();

document.getElementById
("projectName").value="";
}

function displayProjects(){

let list=document.getElementById
("projectList");

list.innerHTML="";

projects.forEach((p,index)=>{

list.innerHTML+=`
<div class="list-item">
${p}
<button onclick="deleteProject(${index})">
Delete
</button>
</div>`;
});
}

function deleteProject(index){

projects.splice(index,1);

displayProjects();

updateDashboard();
}

/* EMPLOYEE */

function addEmployee(){

let name=document.getElementById
("employeeName").value;

if(name==="") return;

employees.push(name);

displayEmployees();

updateDashboard();

document.getElementById
("employeeName").value="";
}

function displayEmployees(){

let list=document.getElementById
("employeeList");

list.innerHTML="";

employees.forEach((e,index)=>{

list.innerHTML+=`
<div class="list-item">
${e}
<button onclick="deleteEmployee(${index})">
Delete
</button>
</div>`;
});
}

function deleteEmployee(index){

employees.splice(index,1);

displayEmployees();

updateDashboard();
}

/* EXPENSE */

function addExpense(){

let name=document.getElementById
("expenseName").value;

let amount=document.getElementById
("expenseAmount").value;

if(name===""||amount==="") return;

expenses.push(name+" - ₹"+amount);

displayExpenses();

updateDashboard();

document.getElementById
("expenseName").value="";

document.getElementById
("expenseAmount").value="";
}

function displayExpenses(){

let list=document.getElementById
("expenseList");

list.innerHTML="";

expenses.forEach((e,index)=>{

list.innerHTML+=`
<div class="list-item">
${e}
<button onclick="deleteExpense(${index})">
Delete
</button>
</div>`;
});
}

function deleteExpense(index){

expenses.splice(index,1);

displayExpenses();

updateDashboard();
}

/* STUDENT */

function addStudent(){

let name=document.getElementById
("studentName").value;

if(name==="") return;

students.push(name);

displayStudents();

updateDashboard();

document.getElementById
("studentName").value="";
}

function displayStudents(){

let list=document.getElementById
("studentList");

list.innerHTML="";

students.forEach((s,index)=>{

list.innerHTML+=`
<div class="list-item">
${s}
<button onclick="deleteStudent(${index})">
Delete
</button>
</div>`;
});
}

function deleteStudent(index){

students.splice(index,1);

displayStudents();

updateDashboard();
}

updateDashboard();

</script>

</body>
</html>
